<div class="space-y-8 animate-fade-in max-w-4xl mx-auto pb-10">
  
  <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100 mt-8">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-gray-900 to-gray-800 px-10 py-10 text-white relative overflow-hidden">
      <div class="absolute top-0 right-0 opacity-10">
        <i class="fas fa-user-circle text-[150px] -mt-10 -mr-10"></i>
      </div>
      <div class="relative z-10 flex items-center gap-6">
        <button (click)="goBack()" class="w-12 h-12 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white transition-all shadow-lg border border-white/20 active:scale-95">
          <i class="fas fa-arrow-left text-xl"></i>
        </button>
        <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center border-4 border-white/20 backdrop-blur-sm">
          <i class="fas fa-user text-3xl text-white"></i>
        </div>
        <div>
          <h2 class="text-3xl font-black tracking-tight">My Profile</h2>
          <p class="text-white/80 font-bold mt-1 uppercase tracking-widest text-xs flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-400"></span>
            Role: {{ userRole }}
          </p>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="flex justify-center items-center p-20">
      <i class="fas fa-spinner fa-spin text-4xl text-gray-300"></i>
    </div>

    <!-- Content -->
    <div *ngIf="!isLoading" class="p-10">
      
      <div *ngIf="successMessage" class="mb-8 p-6 bg-green-50 border-2 border-green-100 rounded-2xl text-green-700 font-bold flex items-center gap-4 animate-scale-in">
        <i class="fas fa-check-circle text-2xl"></i>
        {{ successMessage }}
      </div>
      
      <div *ngIf="errorMessage" class="mb-8 p-6 bg-red-50 border-2 border-red-100 rounded-2xl text-red-700 font-bold flex items-center gap-4 animate-shake">
        <i class="fas fa-exclamation-circle text-2xl"></i>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="submitProfile()" #profileForm="ngForm" class="space-y-8">
        
        <h3 class="text-lg font-black text-gray-900 border-b pb-4 mb-6"><i class="fas fa-id-card text-[#008269] mr-2"></i> Personal Details</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
            <input type="text" name="name" [(ngModel)]="profileData.name" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none font-bold text-gray-800 transition-all">
          </div>
          
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Mobile Number</label>
            <input type="text" name="mobile" [(ngModel)]="profileData.mobile" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none font-bold text-gray-800 transition-all">
          </div>
        </div>

        <div *ngIf="userRole === 'customer'" class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 flex justify-between">
              CNIC <span class="text-red-400">*Read Only</span>
            </label>
            <input type="text" [value]="profileData.cnic" readonly class="w-full px-6 py-4 bg-gray-100 border-2 border-transparent rounded-2xl outline-none font-bold text-gray-500 cursor-not-allowed">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 flex justify-between">
              Account Number <span class="text-red-400">*Read Only</span>
            </label>
            <input type="text" [value]="profileData.accountNumber" readonly class="w-full px-6 py-4 bg-gray-100 border-2 border-transparent rounded-2xl outline-none font-bold text-gray-500 cursor-not-allowed">
          </div>
        </div>

        <h3 class="text-lg font-black text-gray-900 border-b pb-4 mt-12 mb-6"><i class="fas fa-lock text-[#008269] mr-2"></i> Security Details</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Address</label>
            <input type="email" name="email" [(ngModel)]="profileData.email" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none font-bold text-gray-800 transition-all">
          </div>
          
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 flex justify-between">
              New Password <span>(Leave blank to keep current)</span>
            </label>
            <input type="password" name="password" [(ngModel)]="profileData.password" placeholder="••••••••" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none font-bold text-gray-800 transition-all">
          </div>
        </div>

        <div class="pt-8">
          <button type="submit" [disabled]="!profileForm.valid || isSubmitting" class="w-full md:w-auto px-12 py-5 bg-gray-900 hover:bg-black text-white rounded-2xl font-black text-lg shadow-xl shadow-gray-900/20 transition-all active:scale-[0.98] disabled:opacity-50 flex justify-center items-center gap-3">
            <i *ngIf="isSubmitting" class="fas fa-spinner fa-spin"></i>
            {{ isSubmitting ? 'Saving Changes...' : 'Save Profile Changes' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
