<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-[radial-gradient(circle_at_top_right,_var(--color-hbl-green)_0%,_transparent_25%),_radial-gradient(circle_at_bottom_left,_var(--color-hbl-dark)_0%,_transparent_25%)]">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="h-16 w-16 bg-hbl-green flex items-center justify-center rounded-xl shadow-lg border-2 border-white">
        <span class="text-white text-3xl font-bold">H</span>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-hbl-dark">Join HBL Portal</h2>
    <p class="mt-2 text-center text-sm text-gray-600">Register your account to manage complaints</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-2xl">
    <div class="bg-white py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border-t-4 border-hbl-green">
      <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- User Info -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Username</label>
            <input type="text" [(ngModel)]="username" name="username" placeholder="Choose a unique ID" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" [(ngModel)]="email" name="email" placeholder="email@example.com" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
          
          <!-- Personal Info -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="As per CNIC" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">CNIC Number</label>
            <input type="text" [(ngModel)]="cnic" name="cnic" placeholder="42xxx-xxxxxxx-x" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>

          <!-- Account Info -->
          <div>
            <label class="block text-sm font-medium text-gray-700">Mobile Number</label>
            <input type="text" [(ngModel)]="mobile" name="mobile" placeholder="03xxxxxxxxx" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Account Number</label>
            <input type="text" [(ngModel)]="accountNumber" name="accountNumber" placeholder="HBL Account #" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
        </div>

        <div *ngIf="errorMessage" class="text-red-600 text-sm font-medium text-center bg-red-50 p-2 rounded-lg">
          {{ errorMessage }}
        </div>
        
        <div *ngIf="successMessage" class="text-green-600 text-sm font-medium text-center bg-green-50 p-2 rounded-lg">
          {{ successMessage }}
        </div>

        <div>
          <button (click)="onSignup()" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-hbl-green hover:bg-hbl-dark focus:outline-none transition-all duration-300 transform hover:scale-[1.01]">
            CREATE CUSTOMER ACCOUNT
          </button>
        </div>

        <div class="text-center">
          <a href="/login" class="text-sm font-medium text-hbl-green hover:text-hbl-dark transition-colors">
            Already have an account? Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
