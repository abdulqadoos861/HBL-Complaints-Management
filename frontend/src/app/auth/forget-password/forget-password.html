<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-[radial-gradient(circle_at_top_right,_var(--color-hbl-green)_0%,_transparent_25%),_radial-gradient(circle_at_bottom_left,_var(--color-hbl-dark)_0%,_transparent_25%)]">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="h-16 w-16 bg-hbl-green flex items-center justify-center rounded-xl shadow-lg border-2 border-white">
        <span class="text-white text-3xl font-bold">H</span>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-hbl-dark">Reset Password</h2>
    <p class="mt-2 text-center text-sm text-gray-600">Enter your email to receive a reset link</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border-t-4 border-hbl-green">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email address</label>
          <div class="mt-1">
            <input type="email" placeholder="john@example.com" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm transition-all duration-300">
          </div>
        </div>

        <div>
          <button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-hbl-green hover:bg-hbl-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hbl-green transform hover:scale-[1.02] transition-all duration-300">
            SEND RESET LINK
          </button>
        </div>

        <div class="text-center">
          <a href="/login" class="text-sm font-medium text-hbl-green hover:text-hbl-dark transition-colors">
            Back to Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
