<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-[radial-gradient(circle_at_top_right,_var(--color-hbl-green)_0%,_transparent_25%),_radial-gradient(circle_at_bottom_left,_var(--color-hbl-dark)_0%,_transparent_25%)]">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="h-20 w-20 flex items-center justify-center">
        <img src="/favicon.png" class="h-full" alt="HBL Logo">
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-hbl-dark">
      {{ step === 1 ? 'Reset Password' : 'Verify OTP' }}
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      {{ step === 1 ? 'Enter your email to receive a 6-digit OTP' : 'Check your email for the security code' }}
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border-t-4 border-hbl-green">
      
      <!-- Notifications -->
      <div *ngIf="message" class="mb-6 p-4 bg-green-50 border-l-4 border-green-400 text-green-700 text-sm font-bold rounded-r-xl">
        {{ message }}
      </div>
      <div *ngIf="error" class="mb-6 p-4 bg-red-50 border-l-4 border-red-400 text-red-700 text-sm font-bold rounded-r-xl">
        {{ error }}
      </div>

      <!-- Step 1: Request OTP -->
      <div *ngIf="step === 1" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email address</label>
          <div class="mt-1">
            <input type="email" [(ngModel)]="email" placeholder="john@example.com" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm transition-all duration-300">
          </div>
        </div>

        <div>
          <button (click)="requestOTP()" [disabled]="isLoading" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-hbl-green hover:bg-hbl-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hbl-green transform hover:scale-[1.02] transition-all duration-300 disabled:opacity-50">
            <i *ngIf="isLoading" class="fas fa-spinner fa-spin mr-2"></i>
            {{ isLoading ? 'SENDING OTP...' : 'SEND RESET OTP' }}
          </button>
        </div>
      </div>

      <!-- Step 2: Reset Password -->
      <div *ngIf="step === 2" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">Enter OTP</label>
          <div class="mt-1">
            <input type="text" [(ngModel)]="otp" placeholder="6-digit code" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm tracking-[0.5em] text-center font-bold">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">New Password</label>
          <div class="mt-1">
            <input type="password" [(ngModel)]="newPassword" placeholder="••••••••" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <div class="mt-1">
            <input type="password" [(ngModel)]="confirmPassword" placeholder="••••••••" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm">
          </div>
        </div>

        <div>
          <button (click)="resetPassword()" [disabled]="isLoading" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-hbl-green hover:bg-hbl-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hbl-green transform hover:scale-[1.02] transition-all duration-300 disabled:opacity-50">
            <i *ngIf="isLoading" class="fas fa-spinner fa-spin mr-2"></i>
            {{ isLoading ? 'RESETTING...' : 'RESET PASSWORD' }}
          </button>
          <button (click)="step = 1" class="w-full mt-4 text-xs font-bold text-gray-400 hover:text-hbl-green transition-colors uppercase tracking-widest">
            Didn't get code? Try again
          </button>
        </div>
      </div>

      <div class="mt-6 text-center border-t border-gray-100 pt-6">
        <a href="/login" class="text-sm font-medium text-hbl-green hover:text-hbl-dark transition-colors flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left text-xs"></i>
          Back to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
