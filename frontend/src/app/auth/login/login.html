<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-[radial-gradient(circle_at_top_right,_var(--color-hbl-green)_0%,_transparent_25%),_radial-gradient(circle_at_bottom_left,_var(--color-hbl-dark)_0%,_transparent_25%)]">
  
  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex flex-col items-center justify-center space-y-4">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-hbl-green"></div>
    <p class="text-hbl-dark font-medium">Processing...</p>
  </div>

  <div *ngIf="!isLoading" class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="flex justify-center">
      <div class="h-16 w-16 bg-hbl-green flex items-center justify-center rounded-xl shadow-lg border-2 border-white">
        <span class="text-white text-3xl font-bold">HBL</span>
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold text-hbl-dark">HBL Complaints Portal</h2>
    <p class="mt-2 text-center text-sm text-gray-600">Secure access to management system</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border-t-4 border-hbl-green">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">User ID</label>
          <div class="mt-1">
            <input type="text" [(ngModel)]="userId" name="userId" placeholder="Enter your User ID" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm transition-all duration-300">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1">
            <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-hbl-green focus:border-hbl-green sm:text-sm transition-all duration-300">
          </div>
        </div>

        <div *ngIf="errorMessage" class="text-red-600 text-sm font-medium text-center">
          {{ errorMessage }}
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-hbl-green focus:ring-hbl-green border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
          </div>
          <div class="text-sm">
            <a href="/forget-password" class="font-medium text-hbl-green hover:text-hbl-dark transition-colors">Forgot password?</a>
          </div>
        </div>

        <div>
          <button (click)="onLogin()" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-hbl-green hover:bg-hbl-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hbl-green transform hover:scale-[1.02] transition-all duration-300">
            SIGN IN
          </button>
        </div>

        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">New to the portal?</span>
          </div>
        </div>

        <div>
          <a href="/signup" class="w-full flex justify-center py-3 px-4 border-2 border-hbl-green rounded-xl text-sm font-bold text-hbl-green bg-white hover:bg-gray-50 focus:outline-none transition-all duration-300 text-center">
            CREATE ACCOUNT
          </a>
        </div>
      </div>
    </div>
    
    <div class="mt-6 text-center text-xs text-gray-400">
      &copy; 2026 HBL Asset Management. All rights reserved.
    </div>
  </div>
</div>
