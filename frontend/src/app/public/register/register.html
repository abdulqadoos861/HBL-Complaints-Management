<!-- Public Navbar (Guest) -->
<nav class="fixed top-0 left-0 w-full bg-white/95 backdrop-blur-md shadow-sm z-50 py-4 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
    <div class="logo flex items-center gap-2">
      <img src="/favicon.png" class="h-8" alt="HBL Logo">
      <span class="text-2xl font-bold text-hbl-dark">HBL <span class="text-hbl-gold">Complaints</span></span>
    </div>
    <ul class="hidden md:flex space-x-8 items-center m-0 p-0">
      <li><a routerLink="/" class="text-gray-700 font-medium hover:text-hbl-green transition-colors">Home</a></li>
      <li><a routerLink="/track-complaint" class="text-gray-700 font-medium hover:text-hbl-green transition-colors">Track Complaint</a></li>
      <li>
        <a routerLink="/login" class="bg-hbl-green hover:bg-hbl-dark text-white px-6 py-2 rounded-lg font-semibold transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5">
          Login
        </a>
      </li>
    </ul>
  </div>
</nav>

<div class="pt-24 pb-20 bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-6 animate-fade-in">
    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
      <div class="bg-gradient-to-r from-[#008269] to-[#005a4b] px-10 py-12 text-white relative overflow-hidden">
        <div class="relative z-10">
          <h2 class="text-4xl font-black tracking-tight">Register Complaint</h2>
          <p class="text-white/80 mt-2 font-bold text-lg">Official HBL Complaints Management Portal</p>
        </div>
        <div class="absolute -right-20 -bottom-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
      </div>

      <form (ngSubmit)="onSubmit()" #complaintForm="ngForm" class="p-10 space-y-10">
        <!-- Personal Information -->
        <div class="space-y-6">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-1.5 h-8 bg-[#008269] rounded-full"></div>
            <h3 class="text-xl font-black text-gray-900">Personal Information</h3>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Full Name</label>
              <input type="text" [(ngModel)]="complaint.name" name="name" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 placeholder-gray-300" placeholder="e.g. John Doe">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">CNIC Number</label>
              <input type="text" [(ngModel)]="complaint.cnic" name="cnic" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 placeholder-gray-300" placeholder="00000-0000000-0">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Mobile Number</label>
              <input type="text" [(ngModel)]="complaint.mobile" name="mobile" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 placeholder-gray-300" placeholder="03XXXXXXXXX">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email Address</label>
              <input type="email" [(ngModel)]="complaint.email" name="email" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 placeholder-gray-300" placeholder="example@email.com">
            </div>
          </div>
        </div>

        <!-- Complaint Details -->
        <div class="space-y-6 pt-10 border-t border-gray-50">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-1.5 h-8 bg-[#008269] rounded-full"></div>
            <h3 class="text-xl font-black text-gray-900">Complaint Details</h3>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Type</label>
              <select [(ngModel)]="complaint.productType" (change)="onProductChange()" name="productType" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 appearance-none">
                <option value="">Select Product</option>
                <option *ngFor="let p of products" [value]="p._id">{{ p.label }}</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Category</label>
              <select [(ngModel)]="complaint.category" name="category" required [disabled]="!categories.length" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 appearance-none">
                <option value="">Select Category</option>
                <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
              </select>
            </div>
          </div>

          <!-- Dynamic Fields -->
          <div *ngIf="dynamicFields.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
            <div *ngFor="let field of getFilteredDynamicFields()" class="space-y-2">
              <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">{{ field.label }}</label>
              <input *ngIf="field.type !== 'select' && field.type !== 'textarea'" [type]="field.type" [(ngModel)]="dynamicData[field.name]" [name]="field.name" [required]="field.required" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800">
              <textarea *ngIf="field.type === 'textarea'" [(ngModel)]="dynamicData[field.name]" [name]="field.name" [required]="field.required" class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 min-h-[100px]"></textarea>
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Subject</label>
            <input type="text" [(ngModel)]="complaint.subject" name="subject" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 placeholder-gray-300" placeholder="Briefly describe the issue">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Detailed Description</label>
            <textarea [(ngModel)]="complaint.description" name="description" required class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-[#008269] focus:bg-white outline-none transition-all font-bold text-gray-800 min-h-[150px] placeholder-gray-300" placeholder="Provide full details of your complaint..."></textarea>
          </div>
        </div>

        <!-- File Upload -->
        <div class="space-y-6 pt-10 border-t border-gray-50">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-1.5 h-8 bg-[#008269] rounded-full"></div>
            <h3 class="text-xl font-black text-gray-900">Attachments</h3>
          </div>
          
          <div class="relative">
            <input type="file" (change)="onFileChange($event)" multiple id="fileUpload" class="hidden">
            <label for="fileUpload" class="flex flex-col items-center justify-center w-full p-10 border-4 border-dashed border-gray-100 rounded-[2rem] hover:border-[#008269]/30 hover:bg-[#008269]/5 transition-all cursor-pointer group">
              <i class="fas fa-cloud-upload-alt text-4xl text-gray-200 group-hover:text-[#008269] mb-4 transition-all"></i>
              <span class="text-gray-400 font-bold group-hover:text-[#008269]">Click to upload supporting documents</span>
              <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest mt-2">Maximum file size: 10MB</span>
            </label>
            <div *ngIf="selectedFiles.length > 0" class="mt-4 flex flex-wrap gap-2">
              <span *ngFor="let f of selectedFiles" class="px-3 py-1 bg-gray-100 rounded-lg text-[10px] font-bold text-gray-600 border border-gray-200">{{ f.name }}</span>
            </div>
          </div>
        </div>

        <!-- Success/Error Messages -->
        <div *ngIf="successMessage" class="p-6 bg-emerald-50 border-2 border-emerald-100 rounded-2xl text-emerald-700 font-bold text-center animate-bounce">
          {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="p-6 bg-red-50 border-2 border-red-100 rounded-2xl text-red-700 font-bold text-center">
          {{ errorMessage }}
        </div>

        <!-- Submit -->
        <div class="pt-10">
          <button type="submit" [disabled]="!complaintForm.form.valid || isLoading" class="w-full py-5 bg-[#008269] text-white rounded-[2rem] font-black text-lg shadow-2xl hover:bg-[#005a4b] transform hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50 disabled:scale-100 shadow-[#008269]/30">
            <i *ngIf="isLoading" class="fas fa-spinner fa-spin mr-3"></i>
            SUBMIT COMPLAINT
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
